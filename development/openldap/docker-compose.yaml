# version: '3'

services:
  openldap:
    image: tiredofit/openldap:latest
    container_name: openldap
    restart: always
    ports:
      - '389:389'
      - '636:636'
    environment:
      - DOMAIN
      - ORGANIZATION
      - ADMIN_PASS
      - CONFIG_PASS
      - ENABLE_TLS
      # 使用 MDB (新标准)，比旧的 BDB 快且稳
      - BACKEND=mdb
      # 调试日志
      - DEBUG_MODE=TRUE
      - LOG_LEVEL=256
    volumes:
      - ./openldap_data:/var/lib/openldap
      - ./openldap_config:/etc/openldap/slapd.d
    cpus: '1.0'
    mem_limit: 1g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/389'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  openldap-admin:
    container_name: openldap-admin
    image: osixia/phpldapadmin:latest
    ports:
      - '8089:80'
    restart: always
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
      #PHPLDAPADMIN_LDAP_BASE_DN: "dc=weattech,dc=com"
    depends_on:
      - openldap
    cpus: '1.0'
    mem_limit: 1g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/80'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s