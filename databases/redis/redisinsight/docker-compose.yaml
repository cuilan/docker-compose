services:
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    ports:
      - 5540:5540
    volumes:
      # 数据目录挂载
      # 注意：确保主机目录 /data/redisinsight 的权限正确
      # Redis Insight 容器默认使用 UID 1000 运行
      # 如果遇到权限问题，请在主机上执行：
      # sudo chown -R 1000:1000 /data/redisinsight
      # 或者使用 chmod 777（仅限开发环境）
      - /data/redisinsight:/data
    # 使用非 root 用户运行（提升安全性）
    # Redis Insight 镜像默认使用 UID 1000，如果需要使用其他用户，可以取消注释并修改
    # user: '1000:1000'
    environment:
      # 设置用户和组 ID（如果镜像支持）
      - PUID=1000
      - PGID=1000
    # 健康检查
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1:5540/api/health/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    